services:

  nginx:
    container_name: bookshop_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      # Bind-mount gives nginx access to public/ static assets during development.
      # Use :ro — nginx should never write to the source tree.
      - .:/var/www:ro

  php:
    build:
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
    environment:
      APP_ENV:   local
      APP_DEBUG: "true"
    volumes:
      # Full source bind-mount for hot-reload during development.
      # :delegated is a macOS Docker Desktop performance hint (no-op on Linux).
      - .:/var/www:delegated
      # Config files are NOT baked into the image; mount them explicitly.
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro

  db:
    ports:
      # Expose MySQL to the host so developers can connect via local DB clients.
      - "${MYSQL_EXPOSE_PORT:-3307}:3306"

  redis:
    ports:
      # Expose Redis to the host for debugging with redis-cli or GUI tools.
      - "6379:6379"

  minio:
    ports:
      # S3-compatible API used by the application.
      - "9000:9000"
      # MinIO web console for bucket management during development.
      - "9001:9001"

  mailpit:
    ports:
      # Web UI for viewing caught emails.
      - "8025:8025"
      # SMTP port — used by the PHP container.
      - "1025:1025"

  queue:
    container_name: bookshop_queue
    build:
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
    environment:
      APP_ENV:   local
      APP_DEBUG: "true"
    volumes:
      - .:/var/www:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    command: php artisan queue:work --sleep=3 --tries=3 --backoff=10
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped

  stripe:
    container_name: bookshop_stripe
    image: stripe/stripe-cli:latest
    command: listen --forward-to http://nginx/webhooks/stripe --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET}
    depends_on:
      - nginx
    restart: unless-stopped

  node:
    image: node:22-alpine
    container_name: bookshop_node
    working_dir: /var/www
    # Install dependencies on start (idempotent), then launch Vite dev server.
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/var/www
      # Isolate node_modules from the host to avoid cross-platform binary issues.
      - bookshop_node_modules:/var/www/node_modules
    ports:
      # Vite dev server — accessed directly by the browser for HMR.
      - "5173:5173"

volumes:
  bookshop_node_modules:
