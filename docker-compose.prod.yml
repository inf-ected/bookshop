services:

  nginx:
    container_name: bookshop_nginx
    # In production, nginx is built from the nginx-static Dockerfile stage.
    # The public/ directory is baked into the image — no bind-mount needed.
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx-static
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    # SSL certs are stored in docker/nginx/certs/ on the VPS (gitignored).
    # Drop the Cloudflare Origin Certificate there as server.crt + server.key.

  php:
    environment:
      APP_ENV:   production
      APP_DEBUG: "false"
    volumes:
      # storage/ and bootstrap/cache/ must be writable at runtime.
      # Named volumes survive container rebuilds and persist across deploys.
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
      # Production FPM pool: higher limits, worker recycling.
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.prod.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    restart: unless-stopped

  # ── Dev-only services — disabled in production via profiles ─────────────────
  # Assigning profile "dev" means these services only start when explicitly
  # requested with --profile dev. They are never started by docker compose up.
  mailpit:
    profiles: [dev]

  minio:
    profiles: [dev]

  minio-setup:
    profiles: [dev]

  # ── Horizon (queue worker) ───────────────────────────────────────────────────
  # Runs Laravel Horizon — processes all queued jobs (order emails, backups, etc.)
  # Shares the same image as the php service (built from the same Dockerfile).
  queue:
    container_name: bookshop_queue
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    env_file: .env
    environment:
      APP_ENV:   production
      APP_DEBUG: "false"
    volumes:
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.prod.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    command: php artisan horizon
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Scheduler ────────────────────────────────────────────────────────────────
  # Emulates cron: calls `schedule:run` every 60 seconds.
  # Handles: automated DB backups, cart cleanup, pending order expiration.
  scheduler:
    container_name: bookshop_scheduler
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    env_file: .env
    environment:
      APP_ENV:   production
      APP_DEBUG: "false"
    volumes:
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.prod.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

volumes:
  app_storage:
  app_bootstrap_cache:
