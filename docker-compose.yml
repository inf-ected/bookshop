services:

  # ── nginx ───────────────────────────────────────────────────────────────────
  # Dev:  uses plain nginx:alpine image with a source bind-mount (see dev override)
  # Prod: built from the nginx-static Dockerfile stage with public/ baked in
  #
  # env_file is intentionally absent — nginx has no need for Laravel app variables.
  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      php:
        condition: service_started

  # ── php-fpm ─────────────────────────────────────────────────────────────────
  # App is baked into the image at build time.
  # php.ini and www.conf are NOT in the image; they are bind-mounted at runtime
  # so dev and prod can use different configs without a rebuild.
  php:
    container_name: bookshop_php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    env_file: .env
    working_dir: /var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  # Healthcheck ensures php/nginx containers only start after MySQL is ready,
  # eliminating the startup race condition.
  #
  # The application connects as MYSQL_USER (not root).
  # The MySQL Docker image creates MYSQL_USER automatically and grants it
  # ALL PRIVILEGES on MYSQL_DATABASE — no manual GRANT statement needed.
  db:
    container_name: bookshop_db
    image: mysql:8
    stop_grace_period: 60s
    environment:
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # 127.0.0.1 forces TCP instead of the Unix socket.
      # MySQL's Unix socket becomes available during init (while init.sql is still
      # running); TCP port 3306 only opens after all init scripts complete.
      # This means the container only becomes "healthy" when the DB is truly ready.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ───────────────────────────────────────────────────────────────────
  # AOF persistence enabled so the cache/session data survives container restarts.
  redis:
    container_name: bookshop_redis
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # ── MinIO (S3-compatible local storage) ─────────────────────────────────────
  # Provides two buckets: bookshop-public (covers) and bookshop-private (epubs).
  # Console is available at http://localhost:9001 (dev override exposes the port).
  minio:
    container_name: bookshop_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Mailpit (local SMTP catcher) ────────────────────────────────────────────
  # Catches all outgoing mail in dev. Web UI available at http://localhost:8025.
  # SMTP listens on port 1025 inside the Docker network.
  mailpit:
    container_name: bookshop_mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped

  # ── MinIO bucket initialiser ─────────────────────────────────────────────────
  # One-shot container that creates the required buckets on first run.
  # Exits with code 0 after setup — Docker considers this service "completed".
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/bookshop-public &&
        mc mb --ignore-existing local/bookshop-private &&
        mc anonymous set public local/bookshop-public
      "
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

volumes:
  dbdata:
  redisdata:
  miniodata:
