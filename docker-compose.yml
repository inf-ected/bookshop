
services:
  nginx:
    container_name: bookshop_nginx
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    env_file:
      - .env
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - php

  php:
    container_name: bookshop_php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    volumes:
      - .:/var/www:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    working_dir: /var/www
    depends_on:
      - db
      - redis

  db:
    container_name: bookshop_db
    image: mysql:8
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_EXPOSE_PORT}:${MYSQL_PORT}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf:ro

  redis:
    container_name: bookshop_redis
    image: redis:alpine
    env_file:
      - .env

volumes:
  dbdata:
