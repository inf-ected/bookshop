[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data

; Higher limits for production workload
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10

; Recycle workers to prevent memory leaks from accumulating
pm.max_requests = 500
